<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo blanco -->
  <rect width="32" height="32" fill="#ffffff"/>

  <!-- Tres líneas convergentes hacia un punto central derecho -->
  <!-- Literatura (verde) - superior -->
  <path d="M 2 8 Q 12 8, 24 16" stroke="#4a8c5c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Prototipado (azul) - centro -->
  <path d="M 2 16 L 24 16" stroke="#4a6d8c" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Empírico (terracota) - inferior -->
  <path d="M 2 24 Q 12 24, 24 16" stroke="#c46b4a" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Punto de convergencia -->
  <circle cx="24" cy="16" r="3" fill="#2a4a6d"/>
</svg>
